name: mlops-ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-test-train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .

      - name: Lint
        run: ruff check src scripts tests

      - name: Unit tests
        run: pytest -q

      - name: Download data and generate EDA
        run: |
          python scripts/download_data.py
          python scripts/run_eda.py

      - name: Train model with MLflow tracking
        run: python -m heart_disease_mlops.train --fast --tracking-uri mlruns

      - name: Generate report
        run: python scripts/generate_report.py

      - name: Upload assignment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: assignment-artifacts
          path: |
            data/processed/heart_disease_clean.csv
            models/
            reports/
            mlruns/
